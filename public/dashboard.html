<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Alpha One Labs</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ink:#0D0D14;
      --paper:#FFFFFF;
      --teal:#0D9488;
      --teal-dark:#0F766E;
      --teal-light:#14B8A6;
      --teal-dim:#CCFBF1;
      --accent:#F97316;
      --jade:#00B27A;
      --muted:rgba(13,13,20,.48);
      --border:#E2E8F0;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:#FAFBFC;color:var(--ink);overflow-x:hidden;}
    h1,h2,h3,h4{font-family:'Syne',sans-serif;}
    .hidden{display:none!important;}
    a{text-decoration:none;color:inherit;}

    /* ─── NAVBAR ─── */
    #navbar{
      position:sticky;top:0;z-index:200;
      background:rgba(13,148,136,.96);
      backdrop-filter:blur(18px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,.18);
      box-shadow:0 2px 12px rgba(0,0,0,.12);
      transition:box-shadow .3s,background .3s;
    }
    #navbar.scrolled{background:rgba(15,118,110,.98);box-shadow:0 4px 20px rgba(0,0,0,.18);}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:66px;}
    .nav-logo{display:flex;align-items:center;gap:10px;}
    .nav-logo img{width:38px;height:38px;border-radius:10px;}
    .nav-logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nav-link{font-size:.84rem;font-weight:500;color:rgba(255,255,255,.8);padding:6px 14px;border-radius:8px;transition:color .15s,background .15s;}
    .nav-link.active{color:#fff;background:rgba(255,255,255,.18);}
    .nav-link:hover{color:#fff;background:rgba(255,255,255,.12);}
    #nav-auth{display:flex;align-items:center;gap:10px;position:relative;}

    /* ─── HERO ─── */
    .hero{
      background:linear-gradient(135deg,#0F766E 0%,#0D9488 50%,#14B8A6 100%);
      position:relative;overflow:hidden;padding:3rem 1.5rem;
    }
    .hero-mesh{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 40%, rgba(255,255,255,.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 45% at 80% 20%, rgba(20,184,166,.2) 0%, transparent 50%);
      pointer-events:none;
    }
    .hero-content{position:relative;z-index:1;max-width:1200px;margin:0 auto;}
    .hero-content h1{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-.035em;}
    .hero-content p{color:rgba(255,255,255,.62);font-size:.95rem;margin-top:.5rem;}
    .hero-content .hero-meta{color:rgba(255,255,255,.5);font-size:.85rem;margin-top:.25rem;}

    /* ─── CARDS ─── */
    .card{
      background:#fff;
      border-radius:20px;
      border:1px solid var(--border);
      overflow:hidden;
      transition:transform .2s,box-shadow .2s;
    }
    .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,13,20,.08);}
    .card-header{padding:1.5rem;border-bottom:1px solid rgba(13,13,20,.05);display:flex;align-items:center;justify-content:space-between;}
    .card-header h3{font-weight:700;font-size:.9rem;}

    /* ─── STAT CARDS ─── */
    .stat-card{
      background:#fff;border-radius:16px;border:1px solid var(--border);
      padding:1.5rem;text-align:center;transition:transform .2s,box-shadow .2s;
    }
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,13,20,.08);}
    .stat-value{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;margin-bottom:.5rem;}
    .stat-label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

    /* ─── BUTTONS ─── */
    .btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 18px;border-radius:10px;font-family:'Syne',sans-serif;
      font-weight:700;font-size:.82rem;
      border:none;cursor:pointer;text-decoration:none;
      transition:all .18s;
    }
    .btn-primary{background:var(--teal);color:#fff;}
    .btn-primary:hover{background:var(--teal-dark);}
    .btn-primary:disabled{background:rgba(13,148,136,.5);cursor:not-allowed;}
    .btn-secondary{background:#fff;color:var(--teal);border:1.5px solid var(--border);}
    .btn-secondary:hover{background:var(--teal-dim);}
    .btn-small{padding:6px 12px;font-size:.75rem;}

    /* ─── TYPE BADGE ─── */
    .badge{
      display:inline-flex;align-items:center;gap:4px;
      font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;
      padding:4px 10px;border-radius:8px;text-transform:uppercase;
    }

    /* ─── ACTIVITY GRID ─── */
    .activity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem;margin-bottom:3rem;}
    @media(max-width:768px){.activity-grid{grid-template-columns:1fr;}}
    .activity-card{
      background:#fff;border-radius:16px;border:1px solid var(--border);
      padding:1.5rem;display:flex;flex-direction:column;gap:1rem;
      transition:transform .2s,box-shadow .2s;
    }
    .activity-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,13,20,.08);}
    .activity-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--ink);}
    .activity-meta{display:flex;flex-wrap:wrap;gap:.5rem;font-size:.75rem;color:var(--muted);}
    .activity-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem;}
    .activity-actions{display:flex;gap:.75rem;margin-top:auto;}
    .activity-actions a{flex:1;text-align:center;font-size:.75rem;}

    /* ─── QUICK ACTIONS ─── */
    .quick-actions{display:flex;flex-wrap:wrap;gap:1rem;margin:2rem 0;}
    .quick-actions a{
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 18px;border-radius:10px;font-family:'Syne',sans-serif;
      font-weight:700;font-size:.82rem;text-decoration:none;transition:all .18s;
    }

    /* ─── SECTION ─── */
    .section{max-width:1200px;margin:0 auto;padding:0 1.5rem;}
    .section-label{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:.5rem;display:flex;align-items:center;gap:8px;}
    .section-label::before{content:'';width:18px;height:2px;background:var(--teal);border-radius:1px;}
    .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;margin:2rem 0 1.5rem;}

    /* ─── EMPTY STATE ─── */
    .empty-state{text-align:center;padding:3rem 1.5rem;color:var(--muted);}
    .empty-state-icon{font-size:3rem;margin-bottom:1rem;}
    .empty-state-text{font-size:.95rem;margin-bottom:.5rem;}
    .empty-state-link{color:var(--teal);font-weight:700;text-decoration:none;}
    .empty-state-link:hover{text-decoration:underline;}

    /* ─── FOOTER ─── */
    footer{background:#0F172A;color:rgba(255,255,255,.45);padding:2rem 1.5rem;text-align:center;font-size:.75rem;}

    /* ─── GRID ─── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:2rem;}
    @media(max-width:640px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav id="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="./images/logo.png" alt="Alpha One Labs"
           onerror="this.style.display='none';document.getElementById('lf2').style.display='flex'">
      <div id="lf2" style="display:none;width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:10px;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 14L9 4L15 14H3Z" fill="white"/></svg>
      </div>
      <span class="nav-logo-text">Alpha One Labs</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Activities</a>
      <a href="/dashboard.html" class="nav-link active">Dashboard</a>
      <a href="/teach.html" class="nav-link" id="host-link">Host</a>
    </div>
    <div id="nav-auth" style="display:flex;align-items:center;gap:10px;position:relative;">
      <span class="nav-user" style="font-size:.82rem;font-weight:600;color:rgba(255,255,255,.8);text-decoration:none;padding:6px 13px;border-radius:8px;transition:color .15s;" id="nav-user"></span>
      <button type="button" onclick="logout()" style="font-size:.82rem;font-weight:500;color:rgba(255,255,255,.7);text-decoration:none;padding:6px 13px;border-radius:8px;transition:color .15s;background:transparent;border:none;cursor:pointer;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.7)'">Logout</button>
    </div>
  </div>
</nav>

<!-- ─── HERO ─── -->
<div class="hero">
  <div class="hero-mesh"></div>
  <div class="hero-content">
    <h1 id="header-welcome">Welcome!</h1>
    <p id="header-sub">Manage your hosted activities and track your participation.</p>
    <p class="hero-meta" id="header-role-label">Dashboard</p>
  </div>
</div>

<!-- ─── MAIN CONTENT ─── -->
<main style="padding:3rem 0;">

  <div class="section">
    <!-- STAT CARDS -->
    <div class="stat-grid" id="stat-cards"></div>

    <!-- QUICK ACTIONS -->
    <div id="quick-actions"></div>
  </div>

  <!-- HOSTED ACTIVITIES SECTION -->
  <section class="section" style="margin-bottom:3rem;">
    <div class="section-label">My Activities</div>
    <h2 class="section-title" id="section-title">Hosted Activities</h2>
    
    <div class="activity-grid" id="activities-list">
      <div class="activity-card">
        <div style="width:100%;height:120px;background:linear-gradient(135deg,rgba(13,148,136,.1) 0%,rgba(20,184,166,.05) 100%);border-radius:12px;animation:pulse 2s ease-in-out infinite;"></div>
      </div>
      <div class="activity-card">
        <div style="width:100%;height:120px;background:linear-gradient(135deg,rgba(13,148,136,.1) 0%,rgba(20,184,166,.05) 100%);border-radius:12px;animation:pulse 2s ease-in-out infinite;"></div>
      </div>
    </div>

    <div id="empty-state" class="hidden empty-state">
  <p class="empty-state-icon">🎓</p>
  <p class="empty-state-text" id="empty-msg">No hosted activities yet.</p>
  <a id="empty-action-link" href="/teach.html" class="empty-state-link">Create your first activity →</a>
</div>
  </section>

  <!-- JOINED ACTIVITIES SECTION -->
  <div id="joined-section"></div>

</main>

<!-- ─── FOOTER ─── -->
<footer>
  <p>&copy; 2024–2026 Alpha One Labs · All user data encrypted at rest</p>
</footer>

<script>
  const API = '';
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const token = localStorage.getItem('edu_token');
  const user  = JSON.parse(localStorage.getItem('edu_user') || 'null');
  if (!token || !user) window.location.href = '/login.html';
  function logout() { localStorage.clear(); window.location.href = '/login.html'; }

  const typeIcon  = { course:'📚', meetup:'🤝', workshop:'🔧', seminar:'🎤', other:'✨' };
  const typeColor = { course:'bg-indigo-100 text-indigo-700', meetup:'bg-pink-100 text-pink-700', workshop:'bg-orange-100 text-orange-700', seminar:'bg-teal-100 text-teal-700', other:'bg-slate-100 text-slate-600' };
  const fmtLabel  = { live:'Live', self_paced:'Self-paced', hybrid:'Hybrid' };
  const schedLabel = { one_time:'One-time', multi_session:'Multi-session', recurring:'Recurring', ongoing:'Ongoing' };

  document.getElementById('nav-user').textContent = 'Hi, ' + user.username;

  async function loadDashboard() {
    const res  = await fetch('/api/dashboard', { headers:{ Authorization: 'Bearer ' + token } });
    const data = await res.json();
    renderDashboard(data);
  }

  function statCard(value, label) {
    return '<div class="stat-card"><p class="stat-value" style="color:var(--teal);">' + value + '</p><p class="stat-label">' + label + '</p></div>';
  }

  function renderDashboard(data) {
    const hosted = data.hosted_activities || [];
    const joined = data.joined_activities || [];

    document.getElementById('header-welcome').textContent    = 'Hello, ' + user.username + '!';
    document.getElementById('header-sub').textContent        = 'Manage your hosted activities and track your participation.';
    document.getElementById('section-title').textContent     = 'Hosted Activities';

    const totalParts = hosted.reduce((s,a) => s + (a.participant_count||0), 0);
    document.getElementById('stat-cards').innerHTML =
      statCard(hosted.length,  'Hosted Activities') +
      statCard(totalParts,     'Total Participants') +
      statCard(joined.length,  'Activities Joined') +
      statCard('🔒',           'Data Encrypted');

    document.getElementById('quick-actions').innerHTML =
      '<div class="quick-actions">' +
      '<a href="/teach.html" class="btn btn-primary">+ New Activity</a>' +
      '<a href="/" class="btn btn-secondary">Browse All Activities</a>' +
      '</div>';

    if (!hosted.length) {
      document.getElementById('activities-list').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
    } else {
      document.getElementById('activities-list').classList.remove('hidden');
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('activities-list').innerHTML = hosted.map(a => {
        const tc   = typeColor[a.type] || 'bg-slate-100 text-slate-600';
        const ic   = typeIcon[a.type]  || '✨';
        const tags = (a.tags||[]).slice(0,3).map(t => '<span class="badge" style="background:#F0FDFA;color:#0D9488;">' + esc(t) + '</span>').join('');
        return '<article class="activity-card">' +
          '<div>' +
            '<p class="activity-title">' + ic + ' ' + esc(a.title) + '</p>' +
            '<span class="badge" style="background:#F0FDFA;color:#0D9488;">' + esc(a.type) + '</span>' +
          '</div>' +
          '<div class="activity-meta">' +
            '<span>👥 ' + a.participant_count + ' participants</span>' +
            '<span>🗓 ' + a.session_count + ' sessions</span>' +
            '<span>' + (fmtLabel[a.format]||a.format) + '</span>' +
          '</div>' +
          '<div class="activity-tags">' + tags + '</div>' +
          '<div class="activity-actions">' +
            '<a href="/course.html?id=' + esc(a.id) + '" class="btn btn-secondary btn-small">View</a>' +
            '<a href="/teach.html?activity_id=' + esc(a.id) + '" class="btn btn-secondary btn-small">Manage</a>' +
          '</div>' +
          '</article>';
      }).join('');
    }

    let joinedHtml = '<section class="section" style="margin-bottom:3rem;"><div class="section-label">Participation</div><h2 class="section-title">Joined Activities</h2>';
    if (!joined.length) {
      joinedHtml += '<div class="empty-state"><p class="empty-state-icon">📚</p><p class="empty-state-text">No activities joined yet.</p><a href="/" class="empty-state-link">Browse activities →</a></div>';
    } else {
      joinedHtml += '<div class="activity-grid">' + joined.map(a => {
        const tc  = typeColor[a.type] || 'bg-slate-100 text-slate-600';
        const ic  = typeIcon[a.type]  || '✨';
        const tags = (a.tags||[]).slice(0,3).map(t => '<span class="badge" style="background:#F0FDFA;color:#0D9488;">' + esc(t) + '</span>').join('');
        return '<article class="activity-card">' +
          '<div>' +
            '<p class="activity-title">' + ic + ' ' + esc(a.title) + '</p>' +
            '<p style="font-size:.75rem;color:var(--muted);margin-top:.25rem;">by ' + esc(a.host_name) + '</p>' +
            '<span class="badge" style="background:#F0FDFA;color:#0D9488;margin-top:.5rem;">' + esc(a.type) + '</span>' +
          '</div>' +
          '<div class="activity-meta">' +
            '<span>📍 ' + esc(a.enr_role) + '</span>' +
            '<span>✓ ' + esc(a.enr_status) + '</span>' +
            '<span>' + (fmtLabel[a.format]||a.format) + '</span>' +
          '</div>' +
          '<div class="activity-tags">' + tags + '</div>' +
          '<a href="/course.html?id=' + esc(a.id) + '" class="btn btn-secondary btn-small" style="width:100%;text-align:center;">View Activity</a>' +
          '</article>';
      }).join('') + '</div>';
    }
    joinedHtml += '</section>';
    document.getElementById('joined-section').innerHTML = joinedHtml;
  }

  loadDashboard().catch(e => {
    document.getElementById('activities-list').innerHTML =
      '<p style="color:#EF4444;font-size:.9rem;text-align:center;padding:2rem;">Failed to load dashboard: ' + e.message + '</p>';
  });
</script>
</body>
</html>
