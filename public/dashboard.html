<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - EduPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT:'#4F46E5', dark:'#3730A3' } } } } };</script>
  <style>
    .hidden { display: none !important; }
    .gradient-hero { background: linear-gradient(135deg,#4F46E5 0%,#7C3AED 50%,#2563EB 100%); }
    .badge { display:inline-block; padding:2px 10px; border-radius:9999px; font-size:.75rem; font-weight:600; }
    .card-hover { transition:transform .2s,box-shadow .2s; }
    .card-hover:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg gradient-hero flex items-center justify-center text-white font-bold text-sm">E</div>
      <span class="font-bold text-xl text-slate-800">EduPlatform</span>
    </a>
    <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
      <a href="/" class="hover:text-brand">Activities</a>
      <a href="/dashboard.html" class="text-brand hover:text-brand-dark">Dashboard</a>
      <a href="/teach.html" class="hover:text-brand" id="host-link">Host</a>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-slate-600 text-sm hidden sm:block" id="nav-user"></span>
      <button onclick="logout()" class="text-slate-400 text-sm hover:text-red-500 transition">Logout</button>
    </div>
  </div>
</nav>

<div class="gradient-hero text-white py-12 px-4">
  <div class="max-w-7xl mx-auto">
    <p class="text-indigo-200 text-sm font-medium mb-1" id="header-role-label">Dashboard</p>
    <h1 class="text-3xl font-extrabold" id="header-welcome">Welcome!</h1>
    <p class="text-indigo-200 mt-1 text-sm" id="header-sub"></p>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10" id="stat-cards"></div>
  <div id="quick-actions" class="mb-8"></div>
  <h2 class="text-xl font-bold text-slate-800 mb-5" id="section-title">My Activities</h2>
  <div id="activities-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
  </div>
  <div id="empty-state" class="hidden text-center py-20 text-slate-400">
    <p class="text-5xl mb-4">&#128459;</p>
    <p class="text-lg font-medium" id="empty-msg">Nothing here yet.</p>
    <a id="empty-action-link" href="/" class="mt-4 inline-block text-brand font-semibold hover:underline" id="empty-action-text">Browse activities</a>
  </div>
</main>

<footer class="bg-slate-800 text-slate-400 py-6 text-center text-sm mt-10">
  <p>&copy; 2024&ndash;2026 EduPlatform &middot; All user data encrypted at rest</p>
</footer>

<script>
  const API = '';
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const token = localStorage.getItem('edu_token');
  const user  = JSON.parse(localStorage.getItem('edu_user') || 'null');
  if (!token || !user) window.location.href = '/login.html';
  function logout() { localStorage.clear(); window.location.href = '/login.html'; }

  const typeIcon  = { course:'📚', meetup:'🤝', workshop:'🔧', seminar:'🎤', other:'✨' };
  const typeColor = { course:'bg-indigo-100 text-indigo-700', meetup:'bg-pink-100 text-pink-700', workshop:'bg-orange-100 text-orange-700', seminar:'bg-teal-100 text-teal-700', other:'bg-slate-100 text-slate-600' };
  const fmtLabel  = { live:'Live', self_paced:'Self-paced', hybrid:'Hybrid' };
  const schedLabel = { one_time:'One-time', multi_session:'Multi-session', recurring:'Recurring', ongoing:'Ongoing' };

  document.getElementById('nav-user').textContent = 'Hi, ' + user.username;
  if (user.role !== 'host') document.getElementById('host-link').style.display = 'none';

  async function loadDashboard() {
    const res  = await fetch('/api/dashboard', { headers:{ Authorization: 'Bearer ' + token } });
    const data = await res.json();
    if (data.role === 'host') renderHost(data);
    else renderMember(data);
  }

  function statCard(value, label, color) {
    return '<div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center"><p class="text-3xl font-extrabold ' + color + '">' + value + '</p><p class="text-slate-500 text-sm mt-1">' + label + '</p></div>';
  }

  function renderHost(data) {
    const acts = data.hosted_activities || [];
    document.getElementById('header-role-label').textContent = 'Host Dashboard';
    document.getElementById('header-welcome').textContent    = 'Hello, ' + user.username + '!';
    document.getElementById('header-sub').textContent        = 'Manage your hosted activities and track participation.';
    document.getElementById('section-title').textContent     = 'Hosted Activities';

    const totalParts = acts.reduce((s,a) => s + (a.participant_count||0), 0);
    const totalSess  = acts.reduce((s,a) => s + (a.session_count||0), 0);
    document.getElementById('stat-cards').innerHTML =
      statCard(acts.length,    'Hosted',       'text-brand') +
      statCard(totalParts,     'Participants', 'text-purple-600') +
      statCard(totalSess,      'Sessions',     'text-emerald-600') +
      statCard('🔒',           'Encrypted',    'text-amber-500');

    document.getElementById('quick-actions').innerHTML =
      '<div class="flex flex-wrap gap-3">' +
      '<a href="/teach.html" class="inline-flex items-center gap-2 bg-brand text-white font-semibold px-5 py-2.5 rounded-xl hover:bg-brand-dark transition text-sm">+ New Activity</a>' +
      '<a href="/" class="inline-flex items-center gap-2 bg-white border border-slate-200 text-slate-700 font-semibold px-5 py-2.5 rounded-xl hover:bg-slate-50 transition text-sm">Browse All</a>' +
      '</div>';

    if (!acts.length) {
      document.getElementById('activities-list').innerHTML = '';
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('empty-msg').textContent = "You haven't hosted any activities yet.";
      document.getElementById('empty-action-link').href = '/teach.html';
      document.getElementById('empty-action-text').textContent = 'Create your first activity →';
      return;
    }

    document.getElementById('activities-list').innerHTML = acts.map(a => {
      const tc   = typeColor[a.type] || 'bg-slate-100 text-slate-600';
      const ic   = typeIcon[a.type]  || '✨';
      const tags = (a.tags||[]).slice(0,3).map(t => '<span class="badge bg-slate-100 text-slate-500">' + esc(t) + '</span>').join('');
      return '<article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover flex flex-col gap-3">' +
        '<div class="flex items-start justify-between gap-2">' +
          '<h3 class="font-bold text-slate-800 text-sm">' + ic + ' ' + esc(a.title) + '</h3>' +
          '<span class="badge ' + tc + ' shrink-0">' + esc(a.type) + '</span>' +
        '</div>' +
        '<div class="flex gap-3 text-xs text-slate-500">' +
          '<span>👥 ' + a.participant_count + '</span>' +
          '<span>🗓 ' + a.session_count + ' sessions</span>' +
          '<span>' + (fmtLabel[a.format]||a.format) + '</span>' +
        '</div>' +
        '<div class="flex flex-wrap gap-1">' + tags + '</div>' +
        '<div class="mt-auto flex gap-2">' +
          '<a href="/course.html?id=' + esc(a.id) + '" class="flex-1 text-center text-sm font-semibold text-brand border border-brand/30 rounded-lg py-1.5 hover:bg-indigo-50">View</a>' +
          '<a href="/teach.html?activity_id=' + esc(a.id) + '" class="flex-1 text-center text-sm font-semibold text-slate-600 border border-slate-200 rounded-lg py-1.5 hover:bg-slate-50">Manage</a>' +
        '</div>' +
        '</article>';
    }).join('');
  }

  function renderMember(data) {
    const acts = data.joined_activities || [];
    document.getElementById('header-role-label').textContent = 'Member Dashboard';
    document.getElementById('header-welcome').textContent    = 'Hello, ' + user.username + '!';
    document.getElementById('header-sub').textContent        = 'Your joined activities and participation status.';
    document.getElementById('section-title').textContent     = 'Joined Activities';

    document.getElementById('stat-cards').innerHTML =
      statCard(acts.length,                          'Joined',     'text-brand') +
      statCard(acts.filter(a=>a.enr_status==='active').length,  'Active',     'text-emerald-600') +
      statCard(acts.filter(a=>a.enr_role==='instructor').length,'Instructing','text-purple-600') +
      statCard('🔒',                                 'Encrypted',  'text-amber-500');

    document.getElementById('quick-actions').innerHTML =
      '<div class="flex flex-wrap gap-3">' +
      '<a href="/" class="inline-flex items-center gap-2 bg-brand text-white font-semibold px-5 py-2.5 rounded-xl hover:bg-brand-dark transition text-sm">+ Find Activities</a>' +
      '</div>';

    if (!acts.length) {
      document.getElementById('activities-list').innerHTML = '';
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('empty-msg').textContent = "You haven't joined any activities yet.";
      document.getElementById('empty-action-link').href = '/';
      document.getElementById('empty-action-text').textContent = 'Browse activities →';
      return;
    }

    const roleColor = { participant:'bg-slate-100 text-slate-600', instructor:'bg-purple-100 text-purple-700', organizer:'bg-amber-100 text-amber-700' };
    const statusColor = { active:'bg-emerald-100 text-emerald-700', cancelled:'bg-red-100 text-red-700', completed:'bg-blue-100 text-blue-700' };

    document.getElementById('activities-list').innerHTML = acts.map(a => {
      const tc  = typeColor[a.type] || 'bg-slate-100 text-slate-600';
      const ic  = typeIcon[a.type]  || '✨';
      const rc  = roleColor[a.enr_role]      || 'bg-slate-100 text-slate-600';
      const sc  = statusColor[a.enr_status]  || 'bg-slate-100 text-slate-600';
      const tags = (a.tags||[]).slice(0,3).map(t => '<span class="badge bg-slate-100 text-slate-500">' + esc(t) + '</span>').join('');
      return '<article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover flex flex-col gap-3">' +
        '<div class="flex items-start justify-between gap-2">' +
          '<h3 class="font-bold text-slate-800 text-sm">' + ic + ' ' + esc(a.title) + '</h3>' +
          '<span class="badge ' + tc + ' shrink-0">' + esc(a.type) + '</span>' +
        '</div>' +
        '<p class="text-xs text-slate-400">by ' + esc(a.host_name) + '</p>' +
        '<div class="flex flex-wrap gap-1.5">' +
          '<span class="badge ' + rc + '">' + esc(a.enr_role) + '</span>' +
          '<span class="badge ' + sc + '">' + esc(a.enr_status) + '</span>' +
          '<span class="text-xs text-slate-400">' + (fmtLabel[a.format]||a.format) + '</span>' +
        '</div>' +
        '<div class="flex flex-wrap gap-1">' + tags + '</div>' +
        '<a href="/course.html?id=' + esc(a.id) + '" class="mt-auto block text-center text-sm font-semibold text-brand border border-brand/30 rounded-lg py-1.5 hover:bg-indigo-50">View Activity</a>' +
        '</article>';
    }).join('');
  }

  loadDashboard().catch(e => {
    document.getElementById('activities-list').innerHTML =
      '<p class="col-span-3 text-red-400 text-sm">Failed to load dashboard: ' + e.message + '</p>';
  });
</script>
</body>
</html>
